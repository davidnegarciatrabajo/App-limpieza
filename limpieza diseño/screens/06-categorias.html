<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Categorías · Tareas Diarias</title>
  <link rel="stylesheet" href="m3-shared.css" />
</head>
<body>
  <div class="shell" data-od-id="screen-shell">
    <div class="app">
      <header class="top-app-bar" data-od-id="top-bar">
        <h1 class="top-app-bar__title">Categorías</h1>
      </header>

      <p class="task-meta" style="padding:4px 20px 0;margin:0;">Deslizá un ítem: derecha ≈ editar · izquierda ≈ eliminar (requiere confirmación).</p>

      <div class="scroll" data-od-id="lista-cat" style="padding-bottom:100px;">
        <div class="task-row swipe-row swipe-row--edit" style="grid-template-columns:1fr;">
          <div>
            <h2 class="task-title" style="margin-bottom:6px;font-size:17px;">Hogar</h2>
            <p class="task-meta">Tareas asociadas: <span style="font-variant-numeric: tabular-nums;">—</span></p>
          </div>
        </div>
        <div class="task-row swipe-row swipe-row--del" style="grid-template-columns:1fr;">
          <div>
            <h2 class="task-title" style="margin-bottom:6px;font-size:17px;">Trabajo</h2>
            <p class="task-meta">Tareas asociadas: <span style="font-variant-numeric: tabular-nums;">—</span></p>
          </div>
        </div>
        <div class="task-row" style="grid-template-columns:1fr;">
          <div>
            <h2 class="task-title" style="margin-bottom:6px;font-size:17px;">Salud</h2>
            <p class="task-meta">Tareas asociadas: <span style="font-variant-numeric: tabular-nums;">—</span></p>
          </div>
        </div>
      </div>

      <button type="button" class="fab" aria-label="Crear categoría">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </button>

      <nav class="bottom-nav" aria-label="Navegación principal">
        <a class="bottom-nav__item" href="01-hoy.html">
          <svg viewBox="0 0 24 24"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
          Hoy
        </a>
        <a class="bottom-nav__item" href="03-tareas.html">
          <svg viewBox="0 0 24 24"><path d="M9 11H5a2 2 0 0 0-2 2v7h6v-9zM19 9h-4a2 2 0 0 0-2 2v9h6V11a2 2 0 0 0-2-2z"/><path d="M12 2 3 7v2h18V7l-9-5z"/></svg>
          Tareas
        </a>
        <span class="bottom-nav__item bottom-nav__item--active" aria-current="page">
          <svg viewBox="0 0 24 24"><path d="M4 6h7v7H4zM13 6h7v4h-7zM13 12h7v6h-7zM4 15h7v3H4z"/></svg>
          Categorías
        </span>
        <a class="bottom-nav__item" href="02-menu.html">
          <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
          Menú
        </a>
      </nav>
    </div>
  </div>

  <div class="bottom-sheet" data-od-id="sheet-edit">
    <div class="bottom-sheet__handle"></div>
    <h2 style="margin:0 0 8px;font-size:18px;font-weight:500;">Editar categoría</h2>
    <label class="sr-only" for="cat-name">Nombre</label>
    <input id="cat-name" class="input-m3" type="text" value="Hogar" />
    <button type="button" class="btn-filled" style="margin-top:16px;border-radius:20px;">Guardar</button>
    <button type="button" class="btn-outlined" style="margin-top:10px;border-radius:20px;">Cancelar</button>
  </div>
</body>
</html>

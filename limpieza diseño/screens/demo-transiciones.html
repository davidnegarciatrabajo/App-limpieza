<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Demo transiciones · Tareas Diarias</title>
  <link rel="stylesheet" href="m3-shared.css" />
  <style>
    .stage-demo { padding: 16px; min-height: 100%; padding-bottom: 40px; }
    .muted { font-size: 12px; color: var(--md-sys-color-on-surface-variant); margin: 8px 0 16px; }
    #view-detail { display: none; }
    body.detail #view-list { display: none; }
    body.detail #view-detail { display: block; }

    ::view-transition-old(task-title-share),
    ::view-transition-new(task-title-share) {
      animation-duration: 0.32s;
      animation-timing-function: cubic-bezier(0.2, 0.8, 0.2, 1);
    }
  </style>
</head>
<body>
  <div class="stage-demo">
    <p class="muted">Pulse “Abrir editar”: demostración única-documento para compartir <code style="font-size:11px;">view-transition-name</code> sin iframes anidados.</p>
    <div id="view-list" data-od-id="view-list">
      <header class="top-app-bar" style="margin:-16px -16px 8px;margin-bottom:16px;width:calc(100% + 32px);margin-inline:-16px;">
        <h1 class="top-app-bar__title">Tareas · demo transición</h1>
      </header>
      <div class="card-m3 task-row" style="border-radius:var(--radius-12);border:1px solid var(--md-sys-color-outline-variant);cursor:pointer;" id="tile-open" role="button" tabindex="0">
        <span class="status-dot status-dot--overdue"></span>
        <div>
          <h2 class="task-title" style="view-transition-name: task-title-share;">Pagar servicios</h2>
          <div class="chip-row"><span class="chip">Hogar</span><span class="chip chip--periodicity">Mensual</span></div>
        </div>
      </div>
    </div>
    <div id="view-detail" data-od-id="view-detail">
      <header class="top-app-bar" style="margin:-16px -16px 8px;margin-bottom:16px;width:calc(100% + 32px);margin-inline:-16px;">
        <button type="button" class="icon-btn" id="btn-close" aria-label="Volver"><svg viewBox="0 0 24 24"><path d="m15 6-6 6 6 6"/></svg></button>
        <h1 class="top-app-bar__title task-title" style="padding-inline-start:4px;font-size:20px;view-transition-name: task-title-share;">Pagar servicios</h1>
      </header>
      <p class="task-meta">Formulario ficticio tras el mismo título (“elemento compartido”).</p>
      <div class="field" style="padding:16px 0;">
        <label for="fld">Ejemplo campo</label>
        <input id="fld" class="input-m3" type="text" value="" placeholder="—" />
      </div>
    </div>
  </div>
  <script>
    function showDetail() {
      document.body.classList.add('detail');
    }
    function showList() {
      document.body.classList.remove('detail');
    }
    function vt(fn) {
      if (document.startViewTransition) document.startViewTransition(fn);
      else fn();
    }
    document.getElementById('tile-open')?.addEventListener('click', function () {
      vt(showDetail);
    });
    document.getElementById('tile-open')?.addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); vt(showDetail); }
    });
    document.getElementById('btn-close')?.addEventListener('click', function () {
      vt(showList);
    });
  </script>
</body>
</html>
